name: Build Pre-Release
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: build-pre-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  BuildPreRelease:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kernel:
          - id: alpha
            label: alpha-kernel
            mode: alpha
          - id: pin
            label: persistent-pin
            mode: pin
    env:
      PIN_KERNEL_REF: 313230d95da4f28f9c23327709d7c91dcfc48919
      PIN_KERNEL_RELEASE_TAG: v2026.04.20-persistent-pin.5
      PIN_KERNEL_RELEASE_BRANCH: persistent-pin-option-1.19.24merge
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Resolve kernel ref
        id: kernel-ref
        env:
          KERNEL_MODE: ${{ matrix.kernel.mode }}
        run: |
          set -euo pipefail

          if [ "$KERNEL_MODE" = "alpha" ]; then
            git fetch --no-tags --depth=1 origin main
            TARGET_REF=$(git ls-tree FETCH_HEAD core/src/foss/golang/clash | awk '{print $3}')
            KERNEL_SOURCE="origin/main submodule pointer"
          else
            TARGET_REF="$PIN_KERNEL_REF"
            KERNEL_SOURCE="workflow pinned ref"
          fi

          if [ -z "${TARGET_REF:-}" ]; then
            echo "Failed to resolve kernel target ref"
            exit 1
          fi

          echo "target_ref=$TARGET_REF" >> "$GITHUB_OUTPUT"
          echo "kernel_source=$KERNEL_SOURCE" >> "$GITHUB_OUTPUT"

      - name: Checkout kernel submodule ref
        run: |
          set -euo pipefail
          git -C core/src/foss/golang/clash fetch --all --tags --force
          git -C core/src/foss/golang/clash checkout --force "${{ steps.kernel-ref.outputs.target_ref }}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true # Always check for the latest patch release

      - name: Normalize Go module metadata for Android build
        run: |
          set -euo pipefail

          cd core/src/foss/golang/clash
          go mod tidy

          cd ..
          go mod tidy

          cd ../../main/golang
          go mod tidy

          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            case "$abi" in
              arm64-v8a)
                GOARCH=arm64 GOARM= GOOS=android CGO_ENABLED=1 go list -mod=mod -deps -tags foss,with_gvisor,cmfa cfa/native >/dev/null
                ;;
              armeabi-v7a)
                GOARCH=arm GOARM=7 GOOS=android CGO_ENABLED=1 go list -mod=mod -deps -tags foss,with_gvisor,cmfa cfa/native >/dev/null
                ;;
              x86)
                GOARCH=386 GOARM= GOOS=android CGO_ENABLED=1 go list -mod=mod -deps -tags foss,with_gvisor,cmfa cfa/native >/dev/null
                ;;
              x86_64)
                GOARCH=amd64 GOARM= GOOS=android CGO_ENABLED=1 go list -mod=mod -deps -tags foss,with_gvisor,cmfa cfa/native >/dev/null
                ;;
            esac
          done

      - name: Apply Patches
        run: |
          cd $(go env GOROOT)
          for p in $GITHUB_WORKSPACE/.github/patch/*.patch; do patch --verbose -p 1 < "$p"; done

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update CA
        run: |
          sudo apt-get update && sudo apt-get install ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Prepare release metadata
        id: build-meta
        env:
          KERNEL_ID: ${{ matrix.kernel.id }}
          KERNEL_LABEL: ${{ matrix.kernel.label }}
          KERNEL_SOURCE: ${{ steps.kernel-ref.outputs.kernel_source }}
          PIN_KERNEL_REF: ${{ env.PIN_KERNEL_REF }}
          PIN_KERNEL_RELEASE_TAG: ${{ env.PIN_KERNEL_RELEASE_TAG }}
          PIN_KERNEL_RELEASE_BRANCH: ${{ env.PIN_KERNEL_RELEASE_BRANCH }}
        run: |
          set -euo pipefail
          BUILD_TIME_ISO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          INFO_DIR="$RUNNER_TEMP/prerelease-info"
          INFO_FILE="$INFO_DIR/kernel-$KERNEL_ID.md"
          mkdir -p "$INFO_DIR"
          MIHOMO_SHA=$(git -C core/src/foss/golang/clash rev-parse HEAD)

          {
            echo "### Kernel: \`$KERNEL_ID ($KERNEL_LABEL)\`"
            echo "- Build time (UTC): \`$BUILD_TIME_ISO\`"
            echo "- Kernel source: \`$KERNEL_SOURCE\`"
            echo "- mihomo commit: \`$MIHOMO_SHA\`"
            echo "- Kernel module normalized with: \`go mod tidy\`"
            if [ "$KERNEL_ID" = "pin" ]; then
              echo "- pin release tag: \`$PIN_KERNEL_RELEASE_TAG\`"
              echo "- pin release branch: \`$PIN_KERNEL_RELEASE_BRANCH\`"
              echo "- pin resolved commit: \`$PIN_KERNEL_REF\`"
            fi
            echo
          } > "$INFO_FILE"

          echo "info_dir=$INFO_DIR" >> "$GITHUB_OUTPUT"

      - name: Decrypt CI signing keystore
        env:
          CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD: ${{ secrets.CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD:?Missing CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD}"

          openssl enc -d -aes-256-cbc -pbkdf2 \
            -in .github/signing/ci-debug.keystore.enc \
            -out "$RUNNER_TEMP/ci-debug.keystore" \
            -pass env:CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD

          echo "SIGNING_KEYSTORE_FILE=$RUNNER_TEMP/ci-debug.keystore" >> "$GITHUB_ENV"

      - name: Signing properties
        env:
          CI_DEBUG_SIGNING_STORE_PASSWORD: ${{ secrets.CI_DEBUG_SIGNING_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CI_DEBUG_SIGNING_STORE_PASSWORD:?Missing CI_DEBUG_SIGNING_STORE_PASSWORD}"

          cat > signing.properties <<EOF
          keystore.password=$CI_DEBUG_SIGNING_STORE_PASSWORD
          key.alias=ci-debug
          key.password=$CI_DEBUG_SIGNING_STORE_PASSWORD
          EOF

      - name: Pre-release Build
        if: success()
        run: ./gradlew --no-daemon app:assembleMetaRelease

      - name: Suffix APK names by kernel
        env:
          KERNEL_ID: ${{ matrix.kernel.id }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          APK_DIR="app/build/outputs/apk/meta/release"
          FILES=("$APK_DIR"/*.apk)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No pre-release APKs produced."
            exit 1
          fi

          for f in "${FILES[@]}"; do
            base=$(basename "$f")
            mv "$f" "$APK_DIR/${base%.apk}-${KERNEL_ID}.apk"
          done

      - name: Upload Pre-release APK Artifact
        uses: actions/upload-artifact@v4
        if: ${{ success() }}
        with:
          name: prerelease-apk-${{ matrix.kernel.id }}
          path: |
            app/build/outputs/apk/meta/release/*-${{ matrix.kernel.id }}.apk

      - name: Upload Pre-release Metadata Artifact
        uses: actions/upload-artifact@v4
        if: ${{ success() }}
        with:
          name: prerelease-info-${{ matrix.kernel.id }}
          path: |
            ${{ steps.build-meta.outputs.info_dir }}/*.md

  PublishPreRelease:
    needs: [BuildPreRelease]
    runs-on: ubuntu-latest
    env:
      PIN_KERNEL_REF: 313230d95da4f28f9c23327709d7c91dcfc48919
      PIN_KERNEL_RELEASE_TAG: v2026.04.20-persistent-pin.5
      PIN_KERNEL_RELEASE_BRANCH: persistent-pin-option-1.19.24merge
    steps:
      - name: Download pre-release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prerelease-*
          path: ${{ runner.temp }}/prerelease
          merge-multiple: true

      - name: Prepare unified release metadata
        id: release-meta
        env:
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
          PIN_KERNEL_REF: ${{ env.PIN_KERNEL_REF }}
          PIN_KERNEL_RELEASE_TAG: ${{ env.PIN_KERNEL_RELEASE_TAG }}
          PIN_KERNEL_RELEASE_BRANCH: ${{ env.PIN_KERNEL_RELEASE_BRANCH }}
        run: |
          set -euo pipefail
          SAFE_REF=$(printf '%s' "$REF_NAME" | tr '/ ' '-' | tr -cd '[:alnum:]._-')
          if [ -z "$SAFE_REF" ]; then
            SAFE_REF="run-$RUN_ID"
          fi
          SHORT_SHA=$(printf '%s' "$SHA" | cut -c1-8)
          BUILD_TS=$(date -u +%Y%m%d-%H%M%S)
          BUILD_TIME_ISO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NOTES_FILE="$RUNNER_TEMP/prerelease-notes.md"
          mapfile -t KERNEL_INFO_FILES < <(find "$RUNNER_TEMP/prerelease" -type f -name 'kernel-*.md' | sort)
          mapfile -t APK_FILES < <(find "$RUNNER_TEMP/prerelease" -type f -name '*.apk' | sort)

          {
            echo "Automated unified pre-release build for \`$REF_NAME\`."
            echo
            echo "### Build Summary"
            echo "- Commit: \`$SHA\`"
            echo "- Build time (UTC): \`$BUILD_TIME_ISO\`"
            echo "- APK flavor: \`MetaRelease\`"
            echo "- Kernels: \`alpha\`, \`persistent-pin\`"
            echo "- Workflow: https://github.com/$REPOSITORY/actions/runs/$RUN_ID"
            echo "- 文件名后缀: \`-alpha.apk\` 使用上游 alpha kernel，\`-pin.apk\` 使用 persistent-pin kernel。"
            echo
            echo "### Pin Kernel Release Line"
            echo "- pin release tag: \`$PIN_KERNEL_RELEASE_TAG\`"
            echo "- pin release branch: \`$PIN_KERNEL_RELEASE_BRANCH\`"
            echo "- pin resolved commit: \`$PIN_KERNEL_REF\`"
            echo
            echo "### Kernel Build Details"
            if [ ${#KERNEL_INFO_FILES[@]} -gt 0 ]; then
              cat "${KERNEL_INFO_FILES[@]}"
            else
              echo "- No kernel metadata files found."
            fi
            echo
            echo "### Artifacts"
            if [ ${#APK_FILES[@]} -gt 0 ]; then
              for apk in "${APK_FILES[@]}"; do
                echo "- $(basename "$apk")"
              done
            else
              echo "- No APK files found."
            fi
          } > "$NOTES_FILE"

          echo "tag_name=prerelease-meta-$BUILD_TS-$SAFE_REF-dual-kernel-$SHORT_SHA-r$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "release_name=$BUILD_TS Prerelease Meta ($REF_NAME / dual-kernel) [$SHORT_SHA / run $RUN_ID]" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish unified prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.release-meta.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.release-meta.outputs.release_name }}
          NOTES_FILE: ${{ steps.release-meta.outputs.notes_file }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mapfile -t APK_FILES < <(find "$RUNNER_TEMP/prerelease" -type f -name '*.apk' | sort)

          if [ ${#APK_FILES[@]} -eq 0 ]; then
            echo "No APK files found to publish."
            exit 1
          fi

          gh release create "$TAG_NAME" \
            "${APK_FILES[@]}" \
            --target "$TARGET_SHA" \
            --title "$RELEASE_NAME" \
            --notes-file "$NOTES_FILE" \
            --prerelease \
            --latest=false
