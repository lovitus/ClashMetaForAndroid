name: Build Pre-Release
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: build-pre-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  BuildPreRelease:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true # Always check for the latest patch release

      - name: Apply Patches
        run: |
          cd $(go env GOROOT)
          for p in $GITHUB_WORKSPACE/.github/patch/*.patch; do patch --verbose -p 1 < "$p"; done

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update CA
        run: |
          sudo apt-get update && sudo apt-get install ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Prepare release metadata
        id: release-meta
        env:
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SAFE_REF=$(printf '%s' "$REF_NAME" | tr '/ ' '-' | tr -cd '[:alnum:]._-')
          if [ -z "$SAFE_REF" ]; then
            SAFE_REF="run-$RUN_ID"
          fi
          SHORT_SHA=$(printf '%s' "$SHA" | cut -c1-8)
          TAG_NAME="prerelease-alpha-$SAFE_REF-$SHORT_SHA-r$RUN_ID"
          RELEASE_NAME="Prerelease Alpha ($REF_NAME) [$SHORT_SHA / run $RUN_ID]"

          CURRENT_SHA=$(git rev-parse HEAD)
          NOTES_FILE="$RUNNER_TEMP/prerelease-notes.md"

          {
            echo "Automated pre-release build for \`$REF_NAME\`."
            echo
            echo "- Commit: \`$CURRENT_SHA\`"
            echo "- Workflow: https://github.com/$REPOSITORY/actions/runs/$RUN_ID"
          } > "$NOTES_FILE"

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Decrypt CI signing keystore
        env:
          CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD: ${{ secrets.CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD:?Missing CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD}"

          openssl enc -d -aes-256-cbc -pbkdf2 \
            -in .github/signing/ci-debug.keystore.enc \
            -out "$RUNNER_TEMP/ci-debug.keystore" \
            -pass env:CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD

          echo "SIGNING_KEYSTORE_FILE=$RUNNER_TEMP/ci-debug.keystore" >> "$GITHUB_ENV"

      - name: Signing properties
        env:
          CI_DEBUG_SIGNING_STORE_PASSWORD: ${{ secrets.CI_DEBUG_SIGNING_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CI_DEBUG_SIGNING_STORE_PASSWORD:?Missing CI_DEBUG_SIGNING_STORE_PASSWORD}"

          cat > signing.properties <<EOF
          keystore.password=$CI_DEBUG_SIGNING_STORE_PASSWORD
          key.alias=ci-debug
          key.password=$CI_DEBUG_SIGNING_STORE_PASSWORD
          EOF

      - name: Pre-release Build
        if: success()
        run: ./gradlew --no-daemon app:assembleAlphaRelease

      - name: Publish prerelease
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release-meta.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.release-meta.outputs.release_name }}
          NOTES_FILE: ${{ steps.release-meta.outputs.notes_file }}
        run: |
          set -euo pipefail
          TARGET_SHA=$(git rev-parse HEAD)

          gh release create "$TAG_NAME" \
            app/build/outputs/apk/alpha/release/*.apk \
            --target "$TARGET_SHA" \
            --title "$RELEASE_NAME" \
            --notes-file "$NOTES_FILE" \
            --prerelease \
            --latest=false
