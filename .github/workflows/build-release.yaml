name: Build Release

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release Tag (v2.x.x)"
        required: true

permissions:
  contents: write

concurrency:
  group: build-release-${{ inputs.release-tag }}
  cancel-in-progress: true

jobs:
  PrepareRelease:
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.prepare.outputs.target_sha }}
      release_tag: ${{ steps.prepare.outputs.release_tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Convert and set version env
        id: process-version
        run: |
          set -euo pipefail
          VERSION_TAG=${{ inputs.release-tag }}
          VERSION_TAG=${VERSION_TAG#v}
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION_TAG"
          VERSION_CODE=$(printf "%1d%02d%03d" "${VERSION_PARTS[0]}" "${VERSION_PARTS[1]}" "${VERSION_PARTS[2]}")

          echo "versonName=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "versonCode=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Guard existing tag/release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail

          if git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | grep -q "$RELEASE_TAG"; then
            echo "Tag '$RELEASE_TAG' already exists on origin. Refusing to overwrite."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release '$RELEASE_TAG' already exists. Refusing to overwrite."
            exit 1
          fi

      - name: Re-write version
        uses: Devofure/advance-android-version-actions@v1.5
        with:
          gradlePath: build.gradle.kts
          versionCode: ${{ steps.process-version.outputs.versonCode }}
          versionName: ${{ steps.process-version.outputs.versonName }}

      - name: Commit/tag and push
        id: prepare
        env:
          RELEASE_TAG: ${{ inputs.release-tag }}
          NEW_VERSION_NAME: ${{ steps.process-version.outputs.versonName }}
          NEW_VERSION_CODE: ${{ steps.process-version.outputs.versonCode }}
        run: |
          set -euo pipefail

          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          if ! git diff --quiet -- build.gradle.kts; then
            git add build.gradle.kts
            git commit -m "Bump version to $NEW_VERSION_NAME ($NEW_VERSION_CODE)"
          fi

          TARGET_SHA=$(git rev-parse HEAD)
          git tag "$RELEASE_TAG" "$TARGET_SHA"

          git push origin HEAD
          git push origin "$RELEASE_TAG"

          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  BuildRelease:
    needs: PrepareRelease
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kernel:
          - id: alpha
            label: alpha-kernel
            mode: alpha
          - id: pin
            label: persistent-pin
            mode: pin
    env:
      PIN_KERNEL_REF: 313230d95da4f28f9c23327709d7c91dcfc48919
      PIN_KERNEL_RELEASE_TAG: v2026.04.20-persistent-pin.5
      PIN_KERNEL_RELEASE_BRANCH: persistent-pin-option-1.19.24merge
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.PrepareRelease.outputs.target_sha }}

      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Resolve kernel ref
        id: kernel-ref
        env:
          KERNEL_MODE: ${{ matrix.kernel.mode }}
        run: |
          set -euo pipefail

          if [ "$KERNEL_MODE" = "alpha" ]; then
            git fetch --no-tags --depth=1 origin main
            TARGET_REF=$(git ls-tree FETCH_HEAD core/src/foss/golang/clash | awk '{print $3}')
          else
            TARGET_REF="$PIN_KERNEL_REF"
          fi

          if [ -z "${TARGET_REF:-}" ]; then
            echo "Failed to resolve kernel target ref"
            exit 1
          fi

          echo "target_ref=$TARGET_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout kernel submodule ref
        run: |
          set -euo pipefail
          git -C core/src/foss/golang/clash fetch --all --tags --force
          git -C core/src/foss/golang/clash checkout --force "${{ steps.kernel-ref.outputs.target_ref }}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Normalize Go module metadata for Android build
        run: |
          set -euo pipefail

          cd core/src/foss/golang/clash
          go mod tidy

          cd ..
          go mod tidy

          cd ../../main/golang
          go mod tidy

          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            case "$abi" in
              arm64-v8a)
                GOARCH=arm64 GOARM= GOOS=android CGO_ENABLED=1 go list -mod=mod -deps -tags foss,with_gvisor,cmfa cfa/native >/dev/null
                ;;
              armeabi-v7a)
                GOARCH=arm GOARM=7 GOOS=android CGO_ENABLED=1 go list -mod=mod -deps -tags foss,with_gvisor,cmfa cfa/native >/dev/null
                ;;
              x86)
                GOARCH=386 GOARM= GOOS=android CGO_ENABLED=1 go list -mod=mod -deps -tags foss,with_gvisor,cmfa cfa/native >/dev/null
                ;;
              x86_64)
                GOARCH=amd64 GOARM= GOOS=android CGO_ENABLED=1 go list -mod=mod -deps -tags foss,with_gvisor,cmfa cfa/native >/dev/null
                ;;
            esac
          done

      - name: Apply Patches
        run: |
          cd "$(go env GOROOT)"
          for p in "$GITHUB_WORKSPACE"/.github/patch/*.patch; do patch --verbose -p 1 < "$p"; done

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Update CA
        run: |
          sudo apt-get update && sudo apt-get install ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Decrypt CI signing keystore
        env:
          CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD: ${{ secrets.CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD:?Missing CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD}"

          openssl enc -d -aes-256-cbc -pbkdf2 \
            -in .github/signing/ci-debug.keystore.enc \
            -out "$RUNNER_TEMP/ci-debug.keystore" \
            -pass env:CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD

          echo "SIGNING_KEYSTORE_FILE=$RUNNER_TEMP/ci-debug.keystore" >> "$GITHUB_ENV"

      - name: Signing properties
        env:
          CI_DEBUG_SIGNING_STORE_PASSWORD: ${{ secrets.CI_DEBUG_SIGNING_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CI_DEBUG_SIGNING_STORE_PASSWORD:?Missing CI_DEBUG_SIGNING_STORE_PASSWORD}"

          cat > signing.properties <<EOF
          keystore.password=$CI_DEBUG_SIGNING_STORE_PASSWORD
          key.alias=ci-debug
          key.password=$CI_DEBUG_SIGNING_STORE_PASSWORD
          EOF

      - name: Release Build
        if: success()
        run: ./gradlew --no-daemon app:assembleAlphaRelease app:assembleMetaRelease

      - name: Suffix APK names by kernel
        env:
          KERNEL_ID: ${{ matrix.kernel.id }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          APK_DIRS=(
            "app/build/outputs/apk/alpha/release"
            "app/build/outputs/apk/meta/release"
          )
          FILES=()

          for apk_dir in "${APK_DIRS[@]}"; do
            FILES+=("$apk_dir"/*.apk)
          done

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No release APKs produced."
            exit 1
          fi

          for f in "${FILES[@]}"; do
            base=$(basename "$f")
            mv "$f" "$(dirname "$f")/${base%.apk}-${KERNEL_ID}.apk"
          done

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        if: ${{ success() }}
        with:
          name: release-apk-${{ matrix.kernel.id }}
          path: |
            app/build/outputs/apk/alpha/release/*-${{ matrix.kernel.id }}.apk
            app/build/outputs/apk/meta/release/*-${{ matrix.kernel.id }}.apk

  PublishRelease:
    needs: [PrepareRelease, BuildRelease]
    runs-on: ubuntu-latest
    env:
      PIN_KERNEL_REF: 313230d95da4f28f9c23327709d7c91dcfc48919
      PIN_KERNEL_RELEASE_TAG: v2026.04.20-persistent-pin.5
      PIN_KERNEL_RELEASE_BRANCH: persistent-pin-option-1.19.24merge
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-apk-*
          path: ${{ runner.temp }}/release-apks
          merge-multiple: true

      - name: Prepare release metadata
        id: release-meta
        env:
          RELEASE_TAG: ${{ needs.PrepareRelease.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          PIN_KERNEL_REF: ${{ env.PIN_KERNEL_REF }}
          PIN_KERNEL_RELEASE_TAG: ${{ env.PIN_KERNEL_RELEASE_TAG }}
          PIN_KERNEL_RELEASE_BRANCH: ${{ env.PIN_KERNEL_RELEASE_BRANCH }}
        run: |
          set -euo pipefail
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          mapfile -t APK_FILES < <(find "$RUNNER_TEMP/release-apks" -type f -name '*.apk' | sort)

          {
            echo "Automated dual-kernel release build for \`$RELEASE_TAG\`."
            echo
            echo "### 发布概览"
            echo "- Workflow: https://github.com/$REPOSITORY/actions/runs/$RUN_ID"
            echo "- APK flavors: \`AlphaRelease\`, \`MetaRelease\`"
            echo "- Kernels: \`alpha\`, \`persistent-pin\`"
            echo "- 兼容旧数据安装: 使用 \`cmfa-*-alpha-*-pin.apk\`，包名保持 \`com.github.metacubex.clash.alpha\`。"
            echo
            echo "### 内核来源"
            echo "- alpha: 构建时动态解析上游 \`origin/main\` 的子模块指针"
            echo "- persistent-pin release tag: \`$PIN_KERNEL_RELEASE_TAG\`"
            echo "- persistent-pin release branch: \`$PIN_KERNEL_RELEASE_BRANCH\`"
            echo "- persistent-pin resolved commit: \`$PIN_KERNEL_REF\`"
            echo "- build normalization: \`go mod tidy\` executed in kernel module before Android Go build"
            echo "- 说明: 本仓库正式 release 保持一套应用代码，同时提供 \`alpha\` 与 \`persistent-pin\` 两套安装包。"
            echo
            echo "### Artifacts"
            if [ ${#APK_FILES[@]} -gt 0 ]; then
              for apk in "${APK_FILES[@]}"; do
                echo "- $(basename "$apk")"
              done
            else
              echo "- No APK files found."
            fi
            echo
            echo "### 中文说明"
            echo "- 本次正式发布为双内核统一构建结果。"
            echo "- \`alpha\` 面向上游同步验证。"
            echo "- \`persistent-pin\` 固定到 \`$PIN_KERNEL_RELEASE_TAG\` 发布线，适用于自定义 pin 行为场景。"
          } > "$NOTES_FILE"

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.PrepareRelease.outputs.release_tag }}
          NOTES_FILE: ${{ steps.release-meta.outputs.notes_file }}
        run: |
          set -euo pipefail
          mapfile -t APK_FILES < <(find "$RUNNER_TEMP/release-apks" -type f -name '*.apk' | sort)

          if [ ${#APK_FILES[@]} -eq 0 ]; then
            echo "No APK files found to publish."
            exit 1
          fi

          gh release create "$RELEASE_TAG" \
            "${APK_FILES[@]}" \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes-file "$NOTES_FILE" \
            --latest
