name: Build Release

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release Tag (v2.x.x)'
        required: true

permissions:
  contents: write

concurrency:
  group: build-release-${{ inputs.release-tag }}
  cancel-in-progress: true

jobs:
  BuildRelease:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Checkout submodules
        run: git submodule update --init --recursive --force

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true # Always check for the latest patch release

      - name: Apply Patches
        run: |
          cd $(go env GOROOT)
          for p in $GITHUB_WORKSPACE/.github/patch/*.patch; do patch --verbose -p 1 < "$p"; done

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: Convert and set version env
        id: process-version
        run: |
          set -euo pipefail
          VERSION_TAG=${{ inputs.release-tag }}
          VERSION_TAG=${VERSION_TAG#v}                              # remove the 'v' prefix
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION_TAG"         # split into array
          VERSION_CODE=$(printf "%1d%02d%03d" "${VERSION_PARTS[0]}" "${VERSION_PARTS[1]}" "${VERSION_PARTS[2]}")
          
          echo "versonName=$VERSION_TAG" >> $GITHUB_OUTPUT          # "1.2.3"
          echo "versonCode=$VERSION_CODE" >> $GITHUB_OUTPUT         # "102003"

      - name: Guard existing tag/release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail

          if git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | grep -q "$RELEASE_TAG"; then
            echo "Tag '$RELEASE_TAG' already exists on origin. Refusing to overwrite."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release '$RELEASE_TAG' already exists. Refusing to overwrite."
            exit 1
          fi
      
      # Re-write version in build.gradle.kts
      - name: Re-write version
        uses: Devofure/advance-android-version-actions@v1.5
        with:
          gradlePath: build.gradle.kts
          versionCode: ${{ steps.process-version.outputs.versonCode }}
          versionName: ${{ steps.process-version.outputs.versonName }}
      
      # If any change found, commit it and push
      - name: Commit and push if changes
        run: |
          set -euo pipefail
          if ! git diff --quiet -- build.gradle.kts; then
            newVersionName=${{ steps.process-version.outputs.versonName }}
            newVersionCode=${{ steps.process-version.outputs.versonCode }}
            git config --global user.name 'GitHub Action'
            git config --global user.email 'action@github.com'
            git add build.gradle.kts
            git commit -m "Bump version to $newVersionName ($newVersionCode)"
            git tag "v$newVersionName"
            git push --follow-tags
          fi

      - name: Update CA
        run: |
          sudo apt-get update && sudo apt-get install ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Prepare release metadata
        id: release-meta
        env:
          RELEASE_TAG: ${{ inputs.release-tag }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          CURRENT_SHA=$(git rev-parse HEAD)
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          {
            echo "Automated release build for \`$RELEASE_TAG\`."
            echo
            echo "- Commit: \`$CURRENT_SHA\`"
            echo "- Workflow: https://github.com/$REPOSITORY/actions/runs/$RUN_ID"
          } > "$NOTES_FILE"

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Decrypt CI signing keystore
        env:
          CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD: ${{ secrets.CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD:?Missing CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD}"

          openssl enc -d -aes-256-cbc -pbkdf2 \
            -in .github/signing/ci-debug.keystore.enc \
            -out "$RUNNER_TEMP/ci-debug.keystore" \
            -pass env:CI_DEBUG_SIGNING_KEYSTORE_DECRYPT_PASSWORD

          echo "SIGNING_KEYSTORE_FILE=$RUNNER_TEMP/ci-debug.keystore" >> "$GITHUB_ENV"

      - name: Signing properties
        env:
          CI_DEBUG_SIGNING_STORE_PASSWORD: ${{ secrets.CI_DEBUG_SIGNING_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CI_DEBUG_SIGNING_STORE_PASSWORD:?Missing CI_DEBUG_SIGNING_STORE_PASSWORD}"

          cat > signing.properties <<EOF
          keystore.password=$CI_DEBUG_SIGNING_STORE_PASSWORD
          key.alias=ci-debug
          key.password=$CI_DEBUG_SIGNING_STORE_PASSWORD
          EOF

      - name: Release Build
        if: success()
        run: ./gradlew --no-daemon app:assembleMetaRelease

      - name: Tag Repo
        uses: richardsimko/update-tag@v1
        with:
          tag_name: ${{ inputs.release-tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag }}
          NOTES_FILE: ${{ steps.release-meta.outputs.notes_file }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            app/build/outputs/apk/meta/release/*.apk \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes-file "$NOTES_FILE" \
            --latest
